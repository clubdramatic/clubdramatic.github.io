<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dramatic Club</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      object-fit: cover;
      margin-bottom: 18px;
      background: #222;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
    }

    p {
      color: #cfcfcf;
      margin: 10px 0 28px;
      font-size: 15px;
      line-height: 1.5;
    }

    .link {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border: 1px solid #444;
      border-radius: 16px;
      color: #f5f5f5;
      text-decoration: none;
      font-weight: bold;
      background: #1b1b1b;
      transition: 0.2s;
    }

    .link:hover {
      transform: scale(1.02);
      background: #252525;
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>
  <main class="container">
    <img class="logo" src="logo.png" alt="Dramatic Club" />

    <h1>Dramatic Club</h1>

    <p>Tienda de ropa para quienes vivimos el drama con estilo. Be Dramatic.</p>

    <a class="link" href="https://www.instagram.com/dramatic.club" target="_blank">Instagram</a>
    <a class="link" href="https://www.tiktok.com/@dramatic.club" target="_blank">TikTok</a>
    <a class="link" href="https://wa.me/573006001545" target="_blank">WhatsApp</a>
    <a class="link" href="#" target="_blank">Catálogo</a>

    <div class="footer">
      © Dramatic Club
    </div>
  </main>
</body>
</html>
